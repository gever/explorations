<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Predator-Prey Simulator</title>
    <style>
        /* Responsive Full-Screen Layout */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #1e1e24;
            color: #fff;
            margin: 0;
            padding: 0;
            display: flex;
            height: 100vh; /* Fill vertical height */
            overflow: hidden; /* Prevent page scrolling */
        }
        
        /* Main area takes up all remaining space */
        .main-content {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            padding: 20px;
            gap: 20px;
        }

        .canvas-container {
            background-color: #2b2b36;
            border-radius: 8px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.4);
            position: relative;
            overflow: hidden;
        }

        /* Simulation gets max space, graph gets fixed height */
        #simContainer {
            flex-grow: 1; 
        }
        
        #graphContainer {
            flex: 0 0 180px; 
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }

        /* Fixed side panel on the right */
        .side-panel {
            width: 340px;
            min-width: 340px;
            background-color: #25252d;
            border-left: 1px solid #333;
            box-shadow: -4px 0 15px rgba(0,0,0,0.3);
            display: flex;
            flex-direction: column;
            z-index: 10;
        }

        .controls, .info-panel {
            padding: 20px;
        }

        .controls {
            flex-grow: 1;
            overflow-y: auto;
        }

        .info-panel {
            background-color: #1f1f26;
            border-top: 1px solid #333;
        }

        .control-group { margin-bottom: 12px; }
        
        label {
            display: flex;
            justify-content: space-between;
            font-size: 13px;
            margin-bottom: 4px;
            color: #aaa;
        }
        
        input[type="range"] {
            width: 100%;
            cursor: pointer;
        }
        
        .legend-item {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 8px;
            font-size: 14px;
        }
        
        .dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
        }
        
        button {
            width: 100%;
            padding: 12px;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
            margin-top: 10px;
            transition: background-color 0.2s;
        }
        
        button:hover { background-color: #45a049; }
        h2 { margin-top: 0; color: #fff; font-size: 1.3em; margin-bottom: 20px;}
        h3 { margin-top: 0; color: #ddd; font-size: 1.1em; }
        
        /* Custom Scrollbar for controls */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #1e1e24; }
        ::-webkit-scrollbar-thumb { background: #555; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #777; }
    </style>
</head>
<body>

    <div class="main-content">
        <div class="canvas-container" id="simContainer">
            <canvas id="simCanvas"></canvas>
        </div>
        <div class="canvas-container" id="graphContainer">
            <canvas id="graphCanvas"></canvas>
        </div>
    </div>

    <div class="side-panel">
        <div class="controls">
            <h2>Ecosystem Controls</h2>
            
            <div class="control-group">
                <label><span>Rabbit Eat Radius</span> <span id="val-r-rad">20</span></label>
                <input type="range" id="rabbitRadius" min="5" max="100" value="20">
            </div>

            <div class="control-group">
                <label><span>Fox Eat Radius</span> <span id="val-f-rad">30</span></label>
                <input type="range" id="foxRadius" min="5" max="100" value="30">
            </div>

            <div class="control-group">
                <label><span>Rabbit Starvation Time</span> <span id="val-r-life">600</span></label>
                <input type="range" id="rabbitLife" min="100" max="1500" value="600" step="50">
            </div>

            <div class="control-group">
                <label><span>Fox Starvation Time</span> <span id="val-f-life">800</span></label>
                <input type="range" id="foxLife" min="100" max="1500" value="800" step="50">
            </div>

            <div class="control-group">
                <label><span>Berries to Reproduce (N)</span> <span id="val-r-rep">3</span></label>
                <input type="range" id="rabbitRepro" min="1" max="10" value="3">
            </div>

            <div class="control-group">
                <label><span>Rabbits to Reproduce (M)</span> <span id="val-f-rep">2</span></label>
                <input type="range" id="foxRepro" min="1" max="10" value="2">
            </div>
            
            <div class="control-group">
                <label><span>Berry Spawn Rate</span> <span id="val-b-spawn">Medium</span></label>
                <input type="range" id="berrySpawn" min="1" max="10" value="5">
            </div>

            <button onclick="resetSimulation()">Reset Ecosystem</button>
        </div>

        <div class="info-panel">
            <h3>Population Legend</h3>
            <div class="legend-item"><div class="dot" style="background-color: #ff6b6b;"></div> Foxes (Predator)</div>
            <div class="legend-item"><div class="dot" style="background-color: #feca57;"></div> Rabbits (Prey)</div>
            <div class="legend-item"><div class="dot" style="background-color: #1dd1a1;"></div> Berries (Resource)</div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('simCanvas');
        const ctx = canvas.getContext('2d');
        const graphCanvas = document.getElementById('graphCanvas');
        const gCtx = graphCanvas.getContext('2d');

        // State variables
        let berries = [];
        let rabbits = [];
        let foxes = [];
        let particles = [];
        let history = []; 
        let isRunning = false; 

        // Constants
        const RABBIT_SPEED = 1.5;
        const FOX_SPEED = 2.0;

        // DOM Elements
        const inputs = {
            rabbitRadius: document.getElementById('rabbitRadius'),
            foxRadius: document.getElementById('foxRadius'),
            rabbitLife: document.getElementById('rabbitLife'),
            foxLife: document.getElementById('foxLife'),
            rabbitRepro: document.getElementById('rabbitRepro'),
            foxRepro: document.getElementById('foxRepro'),
            berrySpawn: document.getElementById('berrySpawn')
        };
        const displays = {
            rabbitRadius: document.getElementById('val-r-rad'),
            foxRadius: document.getElementById('val-f-rad'),
            rabbitLife: document.getElementById('val-r-life'),
            foxLife: document.getElementById('val-f-life'),
            rabbitRepro: document.getElementById('val-r-rep'),
            foxRepro: document.getElementById('val-f-rep'),
            berrySpawn: document.getElementById('val-b-spawn')
        };

        // Resize function to map internal canvas pixels to display size
        function resizeCanvases() {
            const simContainer = document.getElementById('simContainer');
            const graphContainer = document.getElementById('graphContainer');
            
            canvas.width = simContainer.clientWidth;
            canvas.height = simContainer.clientHeight;
            
            graphCanvas.width = graphContainer.clientWidth;
            graphCanvas.height = graphContainer.clientHeight;
            
            // Redraw static graph immediately to prevent flickering on resize
            if(!isRunning) drawGraph(); 
        }

        // Listen for window resizes
        window.addEventListener('resize', resizeCanvases);

        // Update UI displays
        Object.keys(inputs).forEach(key => {
            inputs[key].addEventListener('input', (e) => {
                let val = e.target.value;
                if(key === 'berrySpawn') {
                    val = val < 4 ? 'Slow' : (val > 7 ? 'Fast' : 'Medium');
                }
                displays[key].innerText = val;
            });
        });

        function randomizeSliders() {
            Object.keys(inputs).forEach(key => {
                const input = inputs[key];
                const min = parseFloat(input.min);
                const max = parseFloat(input.max);
                const step = parseFloat(input.step) || 1;
                
                const steps = Math.floor((max - min) / step);
                const randomStep = Math.floor(Math.random() * (steps + 1));
                input.value = min + (randomStep * step);
                
                input.dispatchEvent(new Event('input'));
            });
        }

        class Entity {
            constructor(x, y) {
                this.x = x || Math.random() * canvas.width;
                this.y = y || Math.random() * canvas.height;
            }
        }

        class Animal extends Entity {
            constructor(x, y, speed) {
                super(x, y);
                this.speed = speed;
                this.angle = Math.random() * Math.PI * 2;
                this.hunger = 0;
                this.foodEaten = 0;
            }

            move() {
                this.angle += (Math.random() - 0.5) * 0.5;
                this.x += Math.cos(this.angle) * this.speed;
                this.y += Math.sin(this.angle) * this.speed;

                // Bounds checking (adapts if window is resized)
                if (this.x < 0 || this.x > canvas.width) {
                    this.angle = Math.PI - this.angle;
                    this.x = Math.max(0, Math.min(this.x, canvas.width));
                }
                if (this.y < 0 || this.y > canvas.height) {
                    this.angle = -this.angle;
                    this.y = Math.max(0, Math.min(this.y, canvas.height));
                }
                this.hunger++;
            }
        }

        class Particle {
            constructor(x, y, color) {
                this.x = x;
                this.y = y;
                this.color = color;
                this.vx = (Math.random() - 0.5) * 5;
                this.vy = (Math.random() - 0.5) * 5;
                this.life = 1.0;
                this.decay = Math.random() * 0.05 + 0.02;
            }

            updateAndDraw(ctx) {
                this.x += this.vx;
                this.y += this.vy;
                this.life -= this.decay;
                
                if (this.life > 0) {
                    ctx.globalAlpha = this.life;
                    ctx.fillStyle = this.color;
                    ctx.beginPath();
                    ctx.arc(this.x, this.y, 2, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.globalAlpha = 1.0;
                }
            }
        }

        function spawnBerry() {
            const spawnRate = 11 - parseInt(inputs.berrySpawn.value);
            // Increased max berries due to larger potential screen size
            if (Math.random() < (1 / spawnRate) && berries.length < 500) {
                berries.push(new Entity());
            }
        }

        function createSparks(x, y, color) {
            for (let i = 0; i < 8; i++) {
                particles.push(new Particle(x, y, color));
            }
        }

        function resetSimulation() {
            berries = [];
            particles = [];
            
            // Adjust starting numbers slightly for larger screens
            const startRabbits = Math.floor(canvas.width / 15);
            const startFoxes = Math.floor(canvas.width / 120) || 1;
            
            rabbits = Array.from({length: startRabbits}, () => new Animal(null, null, RABBIT_SPEED));
            foxes = Array.from({length: startFoxes}, () => new Animal(null, null, FOX_SPEED));
            history = [];
            
            if (!isRunning) {
                isRunning = true;
                update();
            }
        }

        function calculateDistance(e1, e2) {
            return Math.hypot(e1.x - e2.x, e1.y - e2.y);
        }

        function drawGraph() {
            gCtx.clearRect(0, 0, graphCanvas.width, graphCanvas.height);
            if (history.length === 0) return;

            // Keep array size matched to actual canvas pixel width
            if (history.length > graphCanvas.width) {
                history = history.slice(history.length - graphCanvas.width);
            }

            const maxPop = Math.max(10, ...history.map(h => Math.max(h.rabbits, h.foxes)));
            
            // Foxes
            gCtx.beginPath();
            gCtx.strokeStyle = '#ff6b6b';
            gCtx.lineWidth = 2;
            history.forEach((h, i) => {
                const y = graphCanvas.height - (h.foxes / maxPop) * graphCanvas.height;
                if (i === 0) gCtx.moveTo(i, y);
                else gCtx.lineTo(i, y);
            });
            gCtx.stroke();

            // Rabbits
            gCtx.beginPath();
            gCtx.strokeStyle = '#feca57';
            history.forEach((h, i) => {
                const y = graphCanvas.height - (h.rabbits / maxPop) * graphCanvas.height;
                if (i === 0) gCtx.moveTo(i, y);
                else gCtx.lineTo(i, y);
            });
            gCtx.stroke();
        }

        function update() {
            if (!isRunning) return;

            ctx.clearRect(0, 0, canvas.width, canvas.height);

            spawnBerry();

            const rabbitEatRad = parseInt(inputs.rabbitRadius.value);
            const foxEatRad = parseInt(inputs.foxRadius.value);
            const rabbitReproReq = parseInt(inputs.rabbitRepro.value);
            const foxReproReq = parseInt(inputs.foxRepro.value);
            const rabbitMaxHunger = parseInt(inputs.rabbitLife.value);
            const foxMaxHunger = parseInt(inputs.foxLife.value);

            ctx.fillStyle = '#1dd1a1';
            berries.forEach(b => {
                ctx.beginPath();
                ctx.arc(b.x, b.y, 3, 0, Math.PI * 2);
                ctx.fill();
            });

            ctx.fillStyle = '#feca57';
            for (let i = rabbits.length - 1; i >= 0; i--) {
                let r = rabbits[i];
                r.move();

                if (r.hunger > rabbitMaxHunger) {
                    rabbits.splice(i, 1);
                    continue;
                }

                for (let j = berries.length - 1; j >= 0; j--) {
                    if (calculateDistance(r, berries[j]) < rabbitEatRad) {
                        createSparks(berries[j].x, berries[j].y, '#1dd1a1');
                        berries.splice(j, 1);
                        r.hunger = 0;
                        r.foodEaten++;
                        
                        if (r.foodEaten >= rabbitReproReq) {
                            r.foodEaten = 0;
                            rabbits.push(new Animal(r.x, r.y, RABBIT_SPEED));
                        }
                        break;
                    }
                }

                ctx.beginPath();
                ctx.arc(r.x, r.y, 4, 0, Math.PI * 2);
                ctx.fill();
            }

            ctx.fillStyle = '#ff6b6b';
            for (let i = foxes.length - 1; i >= 0; i--) {
                let f = foxes[i];
                f.move();

                if (f.hunger > foxMaxHunger) {
                    foxes.splice(i, 1);
                    continue;
                }

                for (let j = rabbits.length - 1; j >= 0; j--) {
                    if (calculateDistance(f, rabbits[j]) < foxEatRad) {
                        createSparks(rabbits[j].x, rabbits[j].y, '#ffa502');
                        rabbits.splice(j, 1);
                        f.hunger = 0;
                        f.foodEaten++;

                        if (f.foodEaten >= foxReproReq) {
                            f.foodEaten = 0;
                            foxes.push(new Animal(f.x, f.y, FOX_SPEED));
                        }
                        break;
                    }
                }

                ctx.beginPath();
                ctx.arc(f.x, f.y, 6, 0, Math.PI * 2);
                ctx.fill();
            }

            for (let i = particles.length - 1; i >= 0; i--) {
                particles[i].updateAndDraw(ctx);
                if (particles[i].life <= 0) {
                    particles.splice(i, 1);
                }
            }

            if (performance.now() % 100 < 20) {
                history.push({rabbits: rabbits.length, foxes: foxes.length});
            }
            
            drawGraph();

            if (rabbits.length === 0 || foxes.length === 0) {
                isRunning = false;
                ctx.fillStyle = 'rgba(0, 0, 0, 0.6)';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                
                ctx.fillStyle = '#fff';
                ctx.font = 'bold 32px "Segoe UI", sans-serif';
                ctx.textAlign = 'center';
                
                let reason = rabbits.length === 0 ? "Rabbits went extinct!" : "Foxes went extinct!";
                ctx.fillText("Ecosystem Collapsed", canvas.width / 2, canvas.height / 2 - 20);
                
                ctx.font = '20px "Segoe UI", sans-serif';
                ctx.fillStyle = '#ddd';
                ctx.fillText(reason, canvas.width / 2, canvas.height / 2 + 20);
                return; 
            }

            requestAnimationFrame(update);
        }

        // Initialize display sizes first
        resizeCanvases();
        randomizeSliders();
        resetSimulation();

    </script>
</body>
</html>
